name: Deploy Rivie's Moonlit Meowventure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out game
        uses: actions/checkout@v6

      - name: Prepare public site
        run: |
          mkdir public
          cp index.html styles.css game.js public/
          touch public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload game
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Publish game
        id: deployment
        uses: actions/deploy-pages@v4
